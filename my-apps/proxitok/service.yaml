apiVersion: v1
kind: Service
metadata:
  name: proxitok-web
  namespace: proxitok
spec:
  selector:
    app: proxitok-web
  ports:
  - name: http # named port — HTTPRoute backends fail silently without one
    port: 8080
    targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: proxitok-redis
  namespace: proxitok
spec:
  selector:
    app: proxitok-redis
  ports:
  - name: redis # named port — HTTPRoute backends fail silently without one
    port: 6379
    targetPort: 6379
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: proxitok-chromedriver
  namespace: proxitok
spec:
  selector:
    app: proxitok-chromedriver
  ports:
  - name: chromedriver # named port — HTTPRoute backends fail silently without one
    port: 9515
    targetPort: 9515
  type: ClusterIP